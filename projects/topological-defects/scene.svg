<svg viewBox="0 0 1200 760" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="A stylized landscape with a floating portal showing the world inside it twisted by a quarter turn">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#aed6ee"/>
      <stop offset="46%" stop-color="#d9eef8"/>
      <stop offset="100%" stop-color="#cfe6c4"/>
    </linearGradient>
    <linearGradient id="hillFar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#bcdcb0"/><stop offset="100%" stop-color="#a9d09c"/>
    </linearGradient>
    <linearGradient id="hillMid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9fce8e"/><stop offset="100%" stop-color="#83bd76"/>
    </linearGradient>
    <linearGradient id="hillNear" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7fbf6f"/><stop offset="100%" stop-color="#5fa257"/>
    </linearGradient>
    <linearGradient id="river" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#bfe3f2"/><stop offset="100%" stop-color="#86c2dd"/>
    </linearGradient>
    <radialGradient id="sun" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff8e6"/><stop offset="60%" stop-color="#fdeebf" stop-opacity="0.9"/><stop offset="100%" stop-color="#fdeebf" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="portalClip"><rect x="455" y="250" width="290" height="290" rx="22"/></clipPath>
    <linearGradient id="portalSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9ec9e6"/><stop offset="55%" stop-color="#cfe6f4"/><stop offset="100%" stop-color="#c4e3b8"/>
    </linearGradient>
  </defs>

  <!-- sky + sun + clouds -->
  <rect width="1200" height="760" fill="url(#sky)"/>
  <circle cx="980" cy="150" r="150" fill="url(#sun)"/>
  <circle cx="965" cy="150" r="52" fill="#fff7e0"/>
  <g fill="#ffffff" opacity="0.86">
    <ellipse cx="240" cy="135" rx="86" ry="26"/><ellipse cx="300" cy="120" rx="60" ry="22"/><ellipse cx="190" cy="120" rx="50" ry="20"/>
    <ellipse cx="690" cy="95" rx="70" ry="20"/><ellipse cx="740" cy="85" rx="48" ry="17"/>
  </g>
  <!-- birds -->
  <g stroke="#42586a" stroke-width="2.4" fill="none" stroke-linecap="round" opacity="0.7">
    <path d="M120 230 q9 -8 18 0 q9 -8 18 0"/>
    <path d="M170 255 q7 -6 14 0 q7 -6 14 0"/>
  </g>

  <!-- mountain ring (far) -->
  <path d="M0 430 L150 300 L290 400 L430 290 L560 395 L700 300 L860 405 L1000 295 L1130 400 L1200 350 L1200 470 L0 470 Z"
        fill="#a9bcc6" opacity="0.6"/>

  <!-- hills -->
  <path d="M0 470 C220 410 420 470 620 440 C820 412 1010 470 1200 445 L1200 760 L0 760 Z" fill="url(#hillFar)"/>
  <path d="M0 540 C260 478 470 552 700 512 C920 476 1080 548 1200 520 L1200 760 L0 760 Z" fill="url(#hillMid)"/>
  <!-- river -->
  <path d="M520 760 C560 640 470 600 540 545 C600 500 560 470 640 452 L712 460 C660 488 700 520 648 560 C600 596 690 645 660 760 Z" fill="url(#river)" opacity="0.95"/>
  <!-- stone bridge -->
  <g>
    <rect x="556" y="540" width="96" height="16" rx="3" fill="#c8c1b3"/>
    <path d="M566 556 a18 18 0 0 1 36 0 Z" fill="#b7e0ef"/>
    <path d="M606 556 a18 18 0 0 1 36 0 Z" fill="#b7e0ef"/>
  </g>
  <path d="M0 620 C300 552 520 632 760 588 C980 548 1090 624 1200 600 L1200 760 L0 760 Z" fill="url(#hillNear)"/>

  <!-- cottages -->
  <g>
    <rect x="190" y="556" width="48" height="34" fill="#e7ddca"/><path d="M184 556 L214 534 L244 556 Z" fill="#b3553f"/>
    <rect x="252" y="566" width="36" height="26" fill="#e7ddca"/><path d="M247 566 L270 550 L293 566 Z" fill="#b3553f"/>
  </g>
  <!-- trees -->
  <g>
    <g transform="translate(330,612)"><rect x="-4" y="0" width="8" height="22" fill="#7a5638"/><circle cx="0" cy="-8" r="22" fill="#4f9a4a"/></g>
    <g transform="translate(905,600)"><rect x="-4" y="0" width="8" height="24" fill="#7a5638"/><circle cx="0" cy="-8" r="25" fill="#479145"/></g>
    <g transform="translate(960,628)"><rect x="-3" y="0" width="6" height="18" fill="#7a5638"/><circle cx="0" cy="-6" r="17" fill="#56a44f"/></g>
  </g>

  <!-- ===== floating portal defect (a quarter-turn cube) ===== -->
  <!-- soft shadow on the ground -->
  <ellipse cx="600" cy="612" rx="120" ry="20" fill="#2c5a36" opacity="0.18"/>

  <!-- the world seen THROUGH the portal: same scene, rotated a quarter turn + shifted -->
  <g clip-path="url(#portalClip)">
    <rect x="455" y="250" width="290" height="290" fill="url(#portalSky)"/>
    <g transform="rotate(90 600 395)">
      <circle cx="700" cy="320" r="34" fill="#fff7e0"/>
      <path d="M455 470 C540 430 650 478 745 452 L745 540 L455 540 Z" fill="#9fce8e"/>
      <path d="M455 512 C560 470 660 520 745 498 L745 540 L455 540 Z" fill="#6fb263"/>
      <path d="M560 540 C580 500 540 490 575 470 L610 472 C588 494 612 510 600 540 Z" fill="#9fd6ea"/>
      <g transform="translate(660,500)"><rect x="-3" y="0" width="6" height="16" fill="#7a5638"/><circle cx="0" cy="-6" r="15" fill="#4f9a4a"/></g>
    </g>
    <!-- faint conical edge-seams: the deficit-angle lines a flattened twist cell shows -->
    <g stroke="#0c1a26" stroke-width="1" opacity="0.16">
      <line x1="455" y1="395" x2="745" y2="395"/><line x1="600" y1="250" x2="600" y2="540"/>
    </g>
  </g>
  <!-- portal frame -->
  <rect x="455" y="250" width="290" height="290" rx="22" fill="none" stroke="#0c1a26" stroke-width="3" opacity="0.85"/>
  <rect x="455" y="250" width="290" height="290" rx="22" fill="none" stroke="#eaf3fb" stroke-width="1.4" opacity="0.7"/>
  <!-- a hint of a wireframe cube edge to read it as a solid cell -->
  <g stroke="#eaf3fb" stroke-width="1.6" fill="none" opacity="0.55">
    <path d="M455 250 l30 -26 l290 0 l0 290 l-30 26"/>
    <path d="M745 250 l30 -26"/>
  </g>

  <!-- signpost -->
  <g transform="translate(330,560)">
    <rect x="-4" y="0" width="8" height="64" fill="#8a6a47"/>
    <rect x="-46" y="-30" width="92" height="38" rx="6" fill="#10202c"/>
    <rect x="-46" y="-30" width="92" height="38" rx="6" fill="none" stroke="#e8554a" stroke-width="2"/>
    <circle cx="-30" cy="-11" r="6" fill="#e8554a"/>
    <text x="-16" y="-6" font-family="Georgia, serif" font-size="13" fill="#eaf3fb">spin-&#189;</text>
  </g>
</svg>
