<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"/>
<title>Topological defect — orbit viewer</title>
<style>
  html, body { margin: 0; height: 100%; overflow: hidden; background: #9ecbe8;
               font-family: Georgia, 'Times New Roman', serif;
               overscroll-behavior: none; }
  canvas { display: block; touch-action: none; }

  /* name of the defect, top-left, quiet */
  #label { position: fixed; top: calc(14px + env(safe-area-inset-top)); left: 14px;
           color: #fff; background: rgba(18, 28, 38, .45); backdrop-filter: blur(4px);
           padding: 8px 13px; border-radius: 10px; font-size: 14px;
           letter-spacing: .02em; pointer-events: none; }

  /* one-finger / hold-drag hint, fades on first interaction */
  #hint { position: fixed; left: 50%; bottom: calc(26px + env(safe-area-inset-bottom));
          transform: translateX(-50%); color: #fff; font-size: 14px;
          text-shadow: 0 1px 6px rgba(0,0,0,.6); pointer-events: none;
          opacity: .9; transition: opacity .6s ease; letter-spacing: .02em; }
  #hint.gone { opacity: 0; }

  /* edge toggle, bottom-right, thumb-sized */
  #edges { position: fixed; right: calc(16px + env(safe-area-inset-right));
           bottom: calc(16px + env(safe-area-inset-bottom));
           min-width: 112px; min-height: 48px; padding: 0 18px;
           color: #fff; background: rgba(18, 28, 38, .55); backdrop-filter: blur(4px);
           border: 1px solid rgba(255,255,255,.18); border-radius: 12px;
           font-family: inherit; font-size: 15px; letter-spacing: .02em;
           cursor: pointer; -webkit-tap-highlight-color: transparent; }
  #edges:hover { background: rgba(18, 28, 38, .7); }
  #edges:active { transform: translateY(1px); }
  #edges:focus-visible { outline: 2px solid #fff; outline-offset: 2px; }
</style>
<script type="importmap">
{ "imports": { "three": "./vendor/three.module.js" } }
</script>
</head>
<body>
<div id="label">&nbsp;</div>
<div id="hint">Drag to orbit · pinch / scroll to zoom</div>
<button id="edges" type="button" aria-pressed="true">Edges: on</button>
<script type="module" src="./js/viewer-main.js"></script>
</body>
</html>
